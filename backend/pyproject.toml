[project]
name = "agentic-rag-backend"
version = "0.1.0"
description = "Agentic RAG backend (FastAPI + LangGraph + Ollama)"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.30",
    "pgvector>=0.3",
    "redis>=5.2",
    "arq>=0.26",
    "httpx>=0.27",
    "langchain>=0.3",
    "langchain-community>=0.3",
    "langchain-ollama>=0.2",
    "langgraph>=0.2",
    "langfuse>=2.50,<3",
    "python-jose[cryptography]>=3.3",
    "psycopg[binary]>=3.3",
    "structlog>=24.4",
    "sentence-transformers>=3.3",
    "alembic>=1.18.4",
    "python-multipart>=0.0.27",
    "pypdf>=6.10.2",
    "langgraph-checkpoint-postgres>=3.0.5",
]

[tool.uv]
dev-dependencies = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "ruff>=0.7",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
pythonpath = ["."]

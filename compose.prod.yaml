services:
  postgres:
    restart: unless-stopped
    # No ports in production

  redis:
    restart: unless-stopped

  langfuse:
    restart: unless-stopped
    # If langfuse needs to be public, we'd add it to a proxy
    # For now, keeping it internal as per general security advice

  backend:
    build:
      target: prod
    restart: unless-stopped
    volumes: [] # No bind mounts
    # No ports in production

  worker:
    build:
      target: prod
    restart: unless-stopped
    volumes: []

  frontend:
    build:
      target: prod
    restart: unless-stopped
    volumes: []
    ports:
      - "80:3000" # Expose only frontend to the public on port 80
    environment:
      NODE_ENV: production

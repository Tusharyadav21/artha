services:
  postgres:
    image: paradedb/paradedb:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ragapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragapp}
      POSTGRES_DB: ${POSTGRES_DB:-ragapp}
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./infra/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ragapp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
      - public

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
      - public

  langfuse-db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${LANGFUSE_DB_USER:-langfuse}
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD:-langfuse}
      POSTGRES_DB: ${LANGFUSE_DB_NAME:-langfuse}
    volumes:
      - langfuse-db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LANGFUSE_DB_USER:-langfuse}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  langfuse:
    image: langfuse/langfuse:2
    depends_on:
      langfuse-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${LANGFUSE_DB_USER:-langfuse}:${LANGFUSE_DB_PASSWORD:-langfuse}@langfuse-db:5432/${LANGFUSE_DB_NAME:-langfuse}
      NEXTAUTH_URL: ${LANGFUSE_NEXTAUTH_URL:-http://localhost:3001}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-change-me}
      SALT: ${LANGFUSE_SALT:-change-me}
      TELEMETRY_ENABLED: "false"
      HOSTNAME: "0.0.0.0"
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
    ports:
      - "3001:3000"
    networks:
      - internal
      - public

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-ragapp}:${POSTGRES_PASSWORD:-ragapp}@postgres:5432/${POSTGRES_DB:-ragapp}
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL_PLANNER=${OLLAMA_MODEL_PLANNER:-qwen2.5:7b}
      - OLLAMA_MODEL_EMBED=${OLLAMA_MODEL_EMBED:-bge-m3}
      - OLLAMA_MODEL_REASONER=${OLLAMA_MODEL_REASONER:-qwen2.5:7b}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_HOST=http://langfuse:3000
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production-at-least-32-chars}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import json,urllib.request; json.load(urllib.request.urlopen('http://localhost:8000/health/ready'))"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - public

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["arq", "app.services.arq_worker.WorkerSettings"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-ragapp}:${POSTGRES_PASSWORD:-ragapp}@postgres:5432/${POSTGRES_DB:-ragapp}
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production-at-least-32-chars}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - public

#   ollama:
#     image: ollama/ollama:latest
#     volumes:
#       - ollama-data:/root/.ollama
#     healthcheck:
#       test: ["CMD", "ollama", "list"]
#       interval: 30s
#       timeout: 10s
#       retries: 3
#     networks:
#       - internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_healthy
    networks:
      - public

  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./ops/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - public

volumes:
  postgres-data:
  redis-data:
  langfuse-db-data:
  ollama-data:

networks:
  internal:
    internal: true
  public:

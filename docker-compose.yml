services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ragapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragapp}
      POSTGRES_DB: ${POSTGRES_DB:-ragapp}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ragapp}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse:
    image: langfuse/langfuse:2
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-change-me}
      SALT: ${LANGFUSE_SALT:-change-me}
      TELEMETRY_ENABLED: "false"

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ragapp}:${POSTGRES_PASSWORD:-ragapp}@postgres:5432/${POSTGRES_DB:-ragapp}
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL_REASONER: ${OLLAMA_MODEL_REASONER:-qwen2.5:3b}
      OLLAMA_MODEL_PLANNER: ${OLLAMA_MODEL_PLANNER:-qwen2.5:3b}
      OLLAMA_MODEL_EMBED: ${OLLAMA_MODEL_EMBED:-nomic-embed-text}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-4096}
      OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-512}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-at-least-32-chars}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LANGFUSE_HOST: http://langfuse:3000
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
    volumes:
      - ./backend/src:/app/src

  worker:
    build:
      context: ./backend
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["arq", "src.workers.arq_worker.WorkerSettings"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ragapp}:${POSTGRES_PASSWORD:-ragapp}@postgres:5432/${POSTGRES_DB:-ragapp}
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL_REASONER: ${OLLAMA_MODEL_REASONER:-qwen2.5:3b}
      OLLAMA_MODEL_PLANNER: ${OLLAMA_MODEL_PLANNER:-qwen2.5:3b}
      OLLAMA_MODEL_EMBED: ${OLLAMA_MODEL_EMBED:-nomic-embed-text}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-4096}
      OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-512}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-at-least-32-chars}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./backend/src:/app/src

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10


volumes:
  postgres-data:
  redis-data:
  langfuse-db-data:
